<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <title>Вступна кампанія 2024</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
</head>
<body>
  <div class="page">

    <header class="page-header">
      <h1>
        Вступна кампанія 2024:<br>
        кількість вступників та середній конкурсний бал<br>
        (розподіл за статтю)
      </h1>
    </header>

    <div class="page-body">

      <div class="chart-area">
        <div class="axis-top-wrap">
          <svg id="axis-top"></svg>
        </div>
        <div class="bars-scroll" id="bars-scroll">
          <svg id="bars-svg"></svg>
        </div>
        <div class="axis-bottom-wrap">
          <svg id="axis-bottom"></svg>
        </div>
      </div>

      <aside class="sidebar">
        <div class="note">
          Навіть на «переважно чоловічі» спеціальності жінки часто набирають
          вищий конкурсний бал ніж чоловіки.
        </div>
        <div class="legend">
          <div class="legend-item">
            <span class="swatch men-bar"></span>Кількість вступників (Ч)
          </div>
          <div class="legend-item">
            <span class="swatch women-bar"></span>Кількість вступників (Ж)
          </div>
          <div class="legend-item">
            <span class="swatch-dot men-dot"></span>Середній бал (Ч)
          </div>
          <div class="legend-item">
            <span class="swatch-dot women-dot"></span>Середній бал (Ж)
          </div>
        </div>
        <div class="source">Джерело даних: ЄДЕБО</div>
      </aside>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
